<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="famous.land">
    <title>famous.land</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100svh;
        background: #0c0b09;
        overflow: hidden;
      }

      img {
        display: block;
        width: 100vw;
        height: 100svh;
        background: #0c0b09;
        object-fit: cover;
        object-position: center;
      }

      @media (max-width: 700px) and (orientation: portrait) {
        img {
          object-position: 12% center;
        }
      }
    </style>
  </head>
  <body>
    <img src="assets/FamousLand2.png" alt="A FAMOUS tree tag mounted on a tree beside a wooded path.">
  </body>
</html>
